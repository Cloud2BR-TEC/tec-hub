site_name: "Cloud2BR TEC Hub"
site_description: "A catalog of Cloud2BR Technology Education Center learning paths and public resources."
site_url: https://cloud2br-tec.github.io/tec-hub/
docs_dir: docs
use_directory_urls: false

copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-TEC" target="_blank" rel="noopener">Cloud2BR TEC</a>

theme:
  name: material
  language: en
  logo: assets/img/tec-mark.svg
  favicon: assets/img/tec-mark.svg
  features:
    - navigation.top
    - search.highlight
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - tables
  - toc:
      permalink: true

extra_javascript:
  - assets/js/org-link.js
  - assets/js/external-links.js
  - assets/js/repository-catalog.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Hub: index.md
  - Catalog: catalog.md
  - About TEC: about.md